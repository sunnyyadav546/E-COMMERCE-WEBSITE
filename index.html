<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- sunnyraj870931@gmail.com -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendy Shop</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Trendy Shop</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Latest Fashion Collection</h1>
        <p>Discover trendy products at amazing prices.</p>
    </section>

    <main class="product-grid">

        <div class="card">
            <img src="assets/product1.jpeg" alt="T-Shirt">
            <h3>Premium T-Shirt</h3>
            <p class="price">₹1000</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product2.jpeg" alt="Jeans">
            <h3>Blue Jeans</h3>
            <p class="price">₹999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product3.jpeg" alt="Shoes">
            <h3>Running Shoes</h3>
            <p class="price">₹1499</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product4.jpeg" alt="Watch">
            <h3>Smart Watch</h3>
            <p class="price">₹1999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product5.jpeg" alt="Bag">
            <h3>Travel Bag</h3>
            <p class="price">₹899</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="assets/product6.jpeg" alt="Cap">
            <h3>Stylish Cap</h3>
            <p class="price">₹299</p>
            <button>Buy Now</button>
        </div>

    </main>

    <footer>
        <p>© 2025 Trendy Shop | All Rights Reserved</p>
    </footer>

</body>
</html>
